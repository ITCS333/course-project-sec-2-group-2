<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Meta tags for charset and responsive viewport -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title of the page -->
    <title>Weekly Course Breakdown</title>

    <!-- Link to your CSS framework or stylesheet -->
    <link rel="stylesheet" href="style.css">

    <!-- Required: link list.js with defer -->
    <script src="list.js" defer></script>
</head>
<body>

    <!-- Header containing the main title -->
    <header>
        <h1>Weekly Course Breakdown</h1>
    </header>

    <!-- Main content area -->
    <main>

        <!-- Section to contain the list of weeks. 
             The id "week-list-section" is required by list.js -->
        <section id="week-list-section">
            
            <!-- list.js will inject <article> elements here dynamically.
                 Each article will contain:
                 - <h2> Week Title
                 - <p> Start Date
                 - <p> Description
                 - <a> Link to details.html?id=...
            -->

        </section>

    </main>

</body>
</html>
