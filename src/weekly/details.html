<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding (UTF-8) -->
    <meta charset="UTF-8">

    <!-- Responsive viewport tag -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page Title -->
    <title>Week Details</title>

    <!-- Link to CSS framework or stylesheet -->
    <link rel="stylesheet" href="style.css">

    <!-- Required: link details.js with defer -->
    <script src="details.js" defer></script>
</head>
<body>

    <!-- Header containing an empty h1 for details.js to populate -->
    <header>
        <h1 id="week-title"></h1>
    </header>

    <!-- Main content area -->
    <main>

        <!-- ============================================================
             Section 1: Weekly Information
             ============================================================ -->
        <article>
            <!-- Start date placeholder -->
            <p id="week-start-date"></p>

            <h2>Description & Notes</h2>
            <!-- Description placeholder -->
            <p id="week-description"></p>

            <h2>Exercises & Resources</h2>
            <!-- List for links/resources -->
            <ul id="week-links-list">
                <!-- details.js will populate <li><a> items here -->
            </ul>
        </article>


        <!-- ============================================================
             Section 2: Discussion Forum
             ============================================================ -->
        <section id="discussion-forum">
            <h2>Discussion</h2>

            <!-- Subsection 2.1: Existing Comments -->
            <div id="comment-list">
                <!-- details.js will inject <article> elements here -->
            </div>

            <!-- Subsection 2.2: Add a Comment Form -->
            <form id="comment-form" action="#">
                <fieldset>
                    <legend>Leave a Comment</legend>

                    <p>
                        <label for="new-comment">Your Comment:</label><br>
                        <!-- Textarea with required ID "new-comment" -->
                        <textarea id="new-comment" rows="4" required placeholder="Write your thoughts here..."></textarea>
                    </p>

                    <!-- Submit Button -->
                    <button type="submit">Post Comment</button>
                </fieldset>
            </form>
        </section>

    </main>

</body>
</html>
