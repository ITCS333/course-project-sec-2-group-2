<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resource Details</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <script src="details.js" defer></script>
</head>
<body class="bg-light">
    <header class="bg-primary text-white py-4 mb-4">
        <div class="container text-center">
            <h1 id="resource-title">Loading...</h1>
        </div>
    </header>
    <main class="container">
        <article class="card mb-5 p-4 shadow-sm">
            <p id="resource-description" class="lead"></p>
            <a id="resource-link" href="#" class="btn btn-primary btn-lg" target="_blank">Access Resource Material</a>
        </article>

        <section id="discussion" class="mt-4">
            <h3>Discussion</h3>
            <div id="comment-list" class="mb-4"></div>

            <form id="comment-form" class="card p-3 shadow-sm" action="#">
                <fieldset>
                    <legend class="h5">Leave a Comment</legend>
                    <div class="mb-3">
                        <label for="new-comment" class="form-label">Comment:</label>
                        <textarea id="new-comment" class="form-control" rows="3" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-success">Post Comment</button>
                </fieldset>
            </form>
        </section>
    </main>
</body>
</html>
