<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Resources</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <script src="admin.js" defer></script>
</head>
<body class="bg-light">
    <header class="bg-dark text-white py-3 mb-4 shadow">
        <div class="container">
            <h1>Manage Course Resources</h1>
        </div>
    </header>
    <main class="container">
        
        <section class="card p-4 mb-5 shadow-sm">
            <h2>Add a New Resource</h2>
            <form id="resource-form" action="#">
                <fieldset>
                    <legend>Resource Details</legend>
                    <input type="hidden" id="hidden-resource-id">
                    
                    <div class="mb-3">
                        <label for="resource-title" class="form-label">Title</label>
                        <input type="text" id="resource-title" class="form-control" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="resource-description" class="form-label">Description</label>
                        <textarea id="resource-description" class="form-control"></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="resource-link" class="form-label">Link</label>
                        <input type="url" id="resource-link" class="form-control" required>
                    </div>
                    
                    <button type="submit" id="add-resource" class="btn btn-success w-100">Add Resource</button>
                </fieldset>
            </form>
        </section>

        <section class="table-responsive bg-white p-3 shadow-sm rounded">
            <h2>Existing Resources</h2>
            <table id="resources-table" class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Title</th>
                        <th>Description</th>
                        <th>Link</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="resources-tbody">
                    </tbody>
            </table>
        </section>
    </main>
</body>
</html>
