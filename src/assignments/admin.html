<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Responsive viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page title -->
    <title>Manage Assignments</title>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css">

    <!-- Required: link admin.js with defer. -->
    <script src="admin.js" defer></script>
</head>
<body>

    <!-- Header containing h1 -->
    <header>
        <h1>Manage Assignments</h1>
    </header>

    <!-- Main content area -->
    <main>
        <!-- ============================================================
              Add / Edit Assignment Form
             ============================================================ -->
        <section>
            <h2>Add a New Assignment</h2>
            <!-- form id="assignment-form" required by admin.js -->
            <form id="assignment-form" action="#">
                <fieldset>
                    <legend>Assignment Details</legend>
                    
                    <!-- Title Input -->
                    <label for="assignment-title">Title:</label>
                    <input type="text" id="assignment-title" name="assignment-title" required>

                    <!-- Due Date Input -->
                    <label for="assignment-date">Due Date:</label>
                    <input type="date" id="assignment-date" name="assignment-date" required>
                    
                    <!-- Submit Button -->
                    <button type="submit">Submit Assignment</button>
                </fieldset>
            </form>
        </section>

        <!-- ============================================================
              Current Assignments List (CRUD - Read/Update/Delete)
             ============================================================ -->
        <section>
            <h2>Current Assignments</h2>
            <div id="assignment-list">
                <!-- Data will be populated here via admin.js -->
            </div>
        </section>
    </main>

</body>
</html>
